{% extends 'auth.html' %}
{% load static %}


{% block css_files %}
     <link rel="icon" href="{% static 'account/img/fevicon.png' %}" type="image/gif" />
     <link rel="stylesheet" type="text/css" href="{% static 'account/vendor/bootstrap/css/bootstrap.min.css' %}">
     <link rel="stylesheet" type="text/css" href="{% static 'account/fonts/font-awesome-4.7.0/css/font-awesome.min.css' %}">
     <link rel="stylesheet" type="text/css" href="{% static 'account/css/animate.css' %}">
     <link rel="stylesheet" type="text/css" href="{% static 'account/vendor/css-hamburgers/hamburgers.min.css' %}">
     <link rel="stylesheet" type="text/css" href="{% static 'account/vendor/select2/select2.min.css' %}">
     <link rel="stylesheet" type="text/css" href="{% static 'account/css/util.css' %}">
     <link rel="stylesheet" type="text/css" href="{% static 'account/css/main.css' %}">
{% endblock  %}

{% block title %}login{% endblock  %}

{% block content %}
     <div class="limiter">
          <div class="container-login100">
               <!--
               {% if request.user.is_authenticated %}
                         <p class="text-success">Giriş yaptınız</p>
                         <p class="text-success">Kullanıcı: {{request.user.first_name}}</p>
               {% else %}
                         <p class="text-danger">Giriş yapmadınız</p>
               {% endif %}
               -->
               <div class="wrap-login100">
                    
                    <div class="login100-pic js-tilt" data-tilt>
                         <a href="{% url 'index' %}"><img src="{% static 'account/img/logo.png' %}" alt="IMG"> </a>
                    </div>

                    <form action={% url 'login' %} method="POST" class="login100-form validate-form">
                         {% csrf_token %} 
                         {% if error %}
                              <div class="alert alert-danger">
                                   {{ error }}
                              </div>
                         {% endif %}
                         <span class="login100-form-title">
                              Kullanıcı Girişi
                         </span>
                         <div class="wrap-input100 validate-input" data-validate = "Bu kısım zorunludur!">
                              <input class="input100" type="text" name="username" placeholder="Kullanıcı Adı">
                              <span class="focus-input100"></span>
                              <span class="symbol-input100">
                                   <i class="fa fa-envelope" aria-hidden="true"></i>
                              </span>
                         </div>
                         <div class="wrap-input100 validate-input" data-validate = "Bu kısım zorunludur!">
                              <input class="input100" type="password" name="password" placeholder="Şifre">
                              <span class="focus-input100"></span>
                              <span class="symbol-input100">
                                   <i class="fa fa-lock" aria-hidden="true"></i>
                              </span>
                         </div>
                         <div class="container-login100-form-btn">
                              <button type="submit" class="login100-form-btn">
                                   Giriş Yap
                              </button>
                         </div>
                         <div class="text-center p-t-12">
                              <span class="txt1">
                                   Şifremi
                              </span>
                              <a class="txt2" href="remember">
                                   Unuttum
                              </a>
                         </div>
                         <div class="text-center p-t-136">
                              <a class="txt2" href="register">
                                   Hesap Oluştur
                                   <i class="fa fa-long-arrow-right m-l-5" aria-hidden="true"></i>
                              </a>
                         </div>
                    </form>






               </div>
          </div>
     </div>
{% endblock  %}
     
{% block js_files %}
     <script src="{% static 'account/vendor/jquery/jquery-3.2.1.min.js' %}"></script>
	<script src="{% static 'account/vendor/bootstrap/js/popper.js' %}"></script>
	<script src="{% static 'account/vendor/bootstrap/js/bootstrap.min.js' %}"></script>
	<script src="{% static 'account/vendor/select2/select2.min.js' %}"></script>
	<script src="{% static 'account/vendor/tilt/tilt.jquery.min.js' %}"></script>
	<script >
		$('.js-tilt').tilt({
			scale: 1.1
		})
	</script>
	<script src="{% static 'account/js/main.js' %}"></script>
{% endblock  %}
