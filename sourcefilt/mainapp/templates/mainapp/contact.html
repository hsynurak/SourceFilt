{% extends "base.html" %}
{% load static %}

{% block css_files %}
          <!-- bootstrap core css -->
          <link rel="stylesheet" type="text/css" href="{% static 'mainapp/css/bootstrap.css' %}" />
          <!-- fonts style -->
          <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
          <!-- font awesome style -->
          <link href="{% static 'mainapp/css/font-awesome.min.css' %}" rel="stylesheet" />
          <!-- Custom styles for this template -->
          <link href="{% static 'mainapp/css/style.css' %}" rel="stylesheet" />
          <!-- responsive style -->
          <link href="{% static 'mainapp/css/responsive.css' %}" rel="stylesheet" />
{% endblock  %}

{% block title %}Contact Us{% endblock  %}

{% block content %}

<!-- contact section -->
<br>
<br>
<br>
<section class="contact_section layout_padding-bottom">
  <div class="container">
    <div class="heading_container heading_center">
      <h2>
        Bize Ulaşabilirsiniz!
      </h2>
    </div>
    <div class="row">
      <div class="col-md-8 col-lg-6 mx-auto">
        <div class="form_container">

          <form  method="POST" novalidate>
            {% csrf_token %}
            <div>
              <input class="input100" type="text" name="name" placeholder="Adınız" required>
            </div>
            <div>
              <input class="input100" type="email" name="email" placeholder="E-mail Adresiniz" required>
            </div>
            <div>
              <input class="input100" type="text" name="phone" placeholder="Telefon Numaranız" required>
            </div>
            <div>
              <input class="input100" type="text" name="message" placeholder="Mesajınız" required>
            </div>
            <br>
            <div id="success"></div>
            <div class="form-group">
              <button class="btn btn-primary" id="send_message_button" type="submit">Gönder</button>
            </div>
          </form>
          
        </div>
      </div>
    </div>
  </div>
</section>
<!-- end contact section -->

{% endblock  %}

{% block js_files %}{% endblock  %}
